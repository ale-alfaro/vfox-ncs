name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  integration-test:
    strategy:
      fail-fast: false
      matrix:
        ncs_version: ["2.7.0", "3.0.2", "3.2.1"]
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          experimental: true
      - name: Cache nrfutil install
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise/installs/ncs-nrfutil
          key: ncs-nrfutil-${{ runner.os }}-${{ hashFiles('lib/nrfutil.lua') }}
      - name: Cache NCS toolchain
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise/installs/ncs-toolchain
          key: ncs-toolchain-${{ runner.os }}-${{ matrix.ncs_version }}
      - run: mise run ci ${{ matrix.ncs_version }}
