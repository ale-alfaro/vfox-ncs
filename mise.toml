[env]
MISE_USE_VERSIONS_HOST = "0"

[tools]
actionlint = "latest"
hk = "latest"
jq = "latest"
lua = "5.4"
lua-language-server = "latest"
pkl = "latest"
stylua = "latest"

[tasks.format]
description = "Format Lua scripts"
run = "stylua metadata.lua hooks/ lib/"

[tasks.lint]
description = "Lint Lua scripts and GitHub Actions using hk"
run = "hk check"

[tasks.lint-fix]
description = "Fix linting issues"
run = "hk fix"


[tasks.use-plugin]
usage = '''
arg "<ncs_version>" help="Zephyr SDK Version" {
    default "3.2.1"
}
'''
run = '''
SDK_VERSION="${usage_sdk_version:?}"
mise_toolname="ncs:toolchain-manager@${SDK_VERSION}"
mise use "${mise_toolname?}"
'''

[tasks.test]
description = "Run all CI checks: lint → smoke-test → integration-test"
depends = ["lint", "format"]
usage = '''
arg "<ncs_version>" help="Zephyr SDK Version" {
    default "3.2.1"
}
flag "-G --integration" help="Run integration test additional to the smoke test"
'''
run = '''
WORKSPACE=$(mktemp -d)
NCS_TEST_VERSION="${usage_ncs_version:?}" mise run ${=${usage_integration:-smoke-test}:+integration-test ${WORKSPACE}}
'''
