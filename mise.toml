[env]
MISE_USE_VERSIONS_HOST = "0"
BACKEND_VERSION = "3.2.1"
BACKEND = "ncs-test"

[tools]
actionlint = "latest"
hk = "latest"
jq = "latest"
lua = "5.4"
lua-language-server = "latest"
"ncs-test:nrfutil" = "8.1.1"
pkl = "latest"
stylua = "latest"

[tasks.format]
description = "Format Lua scripts"
run = "stylua metadata.lua hooks/ lib/"

[tasks.lint]
description = "Lint Lua scripts and GitHub Actions using hk"
run = "hk check"

[tasks.lint-fix]
description = "Fix linting issues"
run = "hk fix"

[tasks.test]
description = "Run lint → smoke-test"
depends = ["lint", "format"]
run = '''
mise run smoke-test
'''
