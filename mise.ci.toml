[env]
MISE_USE_VERSIONS_HOST = "0"

[tools]
actionlint = "latest"
hk = "latest"
lua = "5.4"
pkl = "latest"
stylua = "latest"

[tasks.lint]
description = "Lint Lua scripts and GitHub Actions using hk"
run = "hk check"

[tasks.test]
description = "Run all CI checks: lint → smoke-test → integration-test"
depends = ["lint"]
run = '''
mise run smoke-test
mise run integration-test
'''
